name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-zip:
    name: Build and attach release zip
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build zip
        run: zip -r van-tilt-sensor-custom-card.zip van-tilt-card.js img

      - name: Upload zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: van-tilt-sensor-custom-card.zip
